server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**,/users/**
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/events/**,/users/*/events/**
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**
        - id: stats-server
          uri: lb://stats-server
          predicates:
            - Path=/hit,/stats/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
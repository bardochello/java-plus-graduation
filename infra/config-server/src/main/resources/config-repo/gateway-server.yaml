server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**

        - id: user-service-admin-root
          uri: lb://user-service
          predicates:
            - Path=/admin/users

        - id: request-service-users
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests/**

        - id: request-service-users-root
          uri: lb://request-service
          predicates:
            - Path=/users/*/requests

        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/users/**,/categories/**,/admin/**,/events/**,/compilations/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
    enabled: true
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
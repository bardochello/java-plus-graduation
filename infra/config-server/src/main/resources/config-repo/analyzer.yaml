server:
  port: 0

grpc:
  server:
    port: 9091
    address: 0.0.0.0

kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  user-actions-consumer:
    topic: stats.user-actions.v1
    group-id: analyzer-user-actions-group
    key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
    value-deserializer: ru.practicum.config.UserActionAvroDeserializer
  events-similarity-consumer:
    topic: stats.events-similarity.v1
    group-id: analyzer-events-similarity-group
    key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
    value-deserializer: ru.practicum.config.EventSimilarityAvroDeserializer

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 3
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.int}
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

server:
  port: 0

kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  consumer:
    group-id: aggregator-group
    topic: stats.user-actions.v1
    key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
    value-deserializer: ru.practicum.config.UserActionAvroDeserializer
  producer:
    topic: stats.events-similarity.v1
    key-serializer: org.apache.kafka.common.serialization.LongSerializer
    value-serializer: ru.practicum.config.EventSimilarityAvroSerializer

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 3
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.int}
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

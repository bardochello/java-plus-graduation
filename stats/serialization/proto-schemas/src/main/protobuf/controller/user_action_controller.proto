syntax = "proto3";

package stats.service.collector;

import "google/protobuf/empty.proto";
import "messages/user_action.proto";

option java_multiple_files = true;
option java_package = "ru.practicum.ewm.stats.proto";
option java_outer_classname = "UserActionControllerOuterClass";

service UserActionController {
  rpc CollectUserAction(ru.practicum.ewm.stats.proto.UserActionProto) returns (google.protobuf.Empty);
}
